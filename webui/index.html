<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>流量包解析交互演示</title>
    <style>
        :root { --primary-color: #007bff; --bg-color: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* 左侧：协议树 */
        #tree-view { width: 40%; height: 100%; border-right: 2px solid #ddd; overflow-y: auto; padding: 15px; background: white; }
        .layer { margin-bottom: 10px; border: 1px solid #eee; border-radius: 4px; }
        .layer-title { background: #e9ecef; padding: 5px 10px; font-weight: bold; cursor: pointer; }
        .field-item { padding: 3px 20px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
        .field-item:hover { background: #f0f7ff; color: var(--primary-color); }

        /* 右侧：Hex 视图 */
        #hex-view { width: 60%; height: 100%; padding: 20px; background: #222; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow-y: auto; line-height: 1.5; }
        .hex-byte { display: inline-block; width: 25px; text-align: center; margin-right: 5px; cursor: default; border-radius: 2px; }
        
        /* 高亮样式 */
        .highlight { background: yellow !important; color: black !important; font-weight: bold; }
        .layer-highlight { background: #444; color: white; }
    </style>
</head>
<body>

<div id="tree-view"><h2>数据包结构</h2><div id="tree-content">加载数据中...</div></div>
<div id="hex-view"><h2>Hex 视图</h2><div id="hex-content"></div></div>

<script>
    // 模拟从 scapy_offsets.json 加载第一个包的数据
    // 在实际项目中，你会用 fetch('scapy_offsets.json') 来获取
    async function init() {
        try {
            const response = await fetch('scapy_offsets.json');
            const data = await response.json();
            const packet = data[0]; // 演示第一个包

            renderHex(packet.raw_hex);
            renderTree(packet.structure);
        } catch (e) {
            document.getElementById('tree-content').innerText = "请确保目录下有 scapy_offsets.json 文件";
        }
    }

    // 渲染右侧 Hex
    function renderHex(hexStr) {
        const container = document.getElementById('hex-content');
        container.innerHTML = '';
        for (let i = 0; i < hexStr.length; i += 2) {
            const byte = hexStr.substr(i, 2);
            const span = document.createElement('span');
            span.className = 'hex-byte';
            span.id = `byte-${i / 2}`;
            span.innerText = byte.toUpperCase();
            container.appendChild(span);
            if ((i / 2 + 1) % 16 === 0) container.appendChild(document.createElement('br'));
        }
    }

    // 渲染左侧树
    function renderTree(structure) {
        const container = document.getElementById('tree-content');
        container.innerHTML = '';

        structure.forEach(layer => {
            const div = document.createElement('div');
            div.className = 'layer';
            
            // 层标题
            const title = document.createElement('div');
            title.className = 'layer-title';
            title.innerText = `[协议层] ${layer.layer}`;
            div.appendChild(title);

            // 字段
            Object.keys(layer.fields).forEach(fieldName => {
                const f = layer.fields[fieldName];
                const fieldItem = document.createElement('div');
                fieldItem.className = 'field-item';
                fieldItem.innerText = `${fieldName}: ${f.value}`;
                
                // 核心：鼠标移入事件
                fieldItem.onmouseover = () => highlightBytes(f.offset, f.length);
                fieldItem.onmouseout = clearHighlight;
                
                div.appendChild(fieldItem);
            });

            container.appendChild(div);
        });
    }

    // 高亮逻辑
    function highlightBytes(offset, length) {
        clearHighlight();
        for (let i = offset; i < offset + length; i++) {
            const el = document.getElementById(`byte-${i}`);
            if (el) el.classList.add('highlight');
        }
    }

    function clearHighlight() {
        document.querySelectorAll('.hex-byte').forEach(el => el.classList.remove('highlight'));
    }

    init();
</script>
</body>
</html>
